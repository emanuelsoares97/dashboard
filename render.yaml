services:
  - type: web
    name: retention-analytics
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: retention-analytics.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://retention-analytics.onrender.com
      - key: DATABASE_URL
        sync: false
